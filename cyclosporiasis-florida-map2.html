  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"88182026-e8d8-4b71-b6dc-b5e110d5c7b7\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>/* HTV Sales — Effra Std webfonts (brand typeface, used across all One Pitch / Proposal Builder materials) */\n\n@font-face {\n  font-family: \"Effra\";\n  src: url(\"dec96f19-a7c6-41ed-85ac-36ffde4913f7\") format(\"truetype\");\n  font-weight: 300;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Effra\";\n  src: url(\"ca6e3719-76aa-4e4b-bb37-78940509fef6\") format(\"truetype\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Effra\";\n  src: url(\"6476c12c-2033-4b80-bf34-ead3e4758406\") format(\"truetype\");\n  font-weight: 500;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Effra\";\n  src: url(\"5fe71333-e909-430d-90ca-69c77c012119\") format(\"truetype\");\n  font-weight: 700;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Effra\";\n  src: url(\"02952f79-cd45-470b-94cd-a80ced0e790b\") format(\"truetype\");\n  font-weight: 800;\n  font-style: normal;\n  font-display: swap;\n}\n<\u002Fstyle>\n  <style>/* HTV Sales — Color tokens\n   Source of truth: PowerPoint theme \"HTV One Pitch 2025\" (Proposal Builder / One Pitch templates).\n   Base palette = the exact theme swatches. Semantic aliases sit on top. */\n\n:root {\n  /* ---- Brand base palette (verbatim from the HTV One Pitch 2025 theme) ---- */\n  --htv-navy:        #00102D; /* dk1 — primary ink, dark surfaces, footers          */\n  --htv-navy-panel:  #0A234C; /* deep blue panel used on dark \"difference\" slides    */\n  --htv-blue:        #1A6BE1; /* dk2 — THE brand blue. Hero fills, bars, links       */\n  --htv-sky:         #5692D1; /* accent5 — lighter blue, eyebrow labels on dark      */\n  --htv-gold:        #F1D273; /* accent1 — hero stat numbers, highlights, hyperlinks */\n  --htv-red:         #D7040F; /* accent2 — alerts / sparing emphasis                 */\n  --htv-teal:        #3EBEC4; /* accent3                                             */\n  --htv-lime:        #B4E520; /* accent4                                             */\n  --htv-lavender:    #8D9CD3; /* accent6                                             */\n  --htv-gray:        #F2F2F2; /* lt2 — light section surface                         */\n  --htv-white:       #FFFFFF; /* lt1                                                 */\n\n  /* ---- Derived blue ramp (for hover / depth / gradients) ---- */\n  --htv-blue-700:    #1450B0;\n  --htv-blue-800:    #0E3C86;\n  --htv-blue-300:    #8FBCF0;\n  --htv-blue-100:    #E6EFFB;\n  --htv-gold-600:    #D9B24A;\n\n  /* ---- Neutral ramp (derived from navy, cool gray) ---- */\n  --neutral-0:   #FFFFFF;\n  --neutral-50:  #F7F8FA;\n  --neutral-100: #F2F2F2;\n  --neutral-200: #E2E5EA;\n  --neutral-300: #CBD1DA;\n  --neutral-400: #9AA3B2;\n  --neutral-500: #6B7585;\n  --neutral-600: #4A5567;\n  --neutral-700: #2E394C;\n  --neutral-900: #00102D;\n\n  /* ---- Brand gradients (the One Pitch \"diagrid\" blue backgrounds) ---- */\n  --gradient-blue: linear-gradient(135deg, #1A6BE1 0%, #134FAE 55%, #0A2C6E 100%); /* @kind color */\n  --gradient-blue-deep: linear-gradient(160deg, #0A234C 0%, #00102D 100%); /* @kind color */\n\n  /* ---- Semantic aliases ---- */\n  --text-primary:    var(--htv-navy);\n  --text-secondary:  var(--neutral-600);\n  --text-muted:      var(--neutral-500);\n  --text-on-dark:    var(--htv-white);\n  --text-on-dark-dim:#B9C6DD;\n  --text-accent:     var(--htv-blue);\n  --text-link:       var(--htv-blue);\n\n  --surface-page:    var(--htv-white);\n  --surface-subtle:  var(--htv-gray);\n  --surface-card:    var(--htv-white);\n  --surface-dark:    var(--htv-navy);\n  --surface-panel:   var(--htv-navy-panel);\n  --surface-brand:   var(--htv-blue);\n\n  --border-subtle:   var(--neutral-200);\n  --border-default:  var(--neutral-300);\n  --border-on-dark:  rgba(255,255,255,0.18);\n\n  /* eyebrow / kicker labels (the ALL-CAPS tracked text above headlines) */\n  --label-on-light:  var(--htv-blue);\n  --label-on-dark:   var(--htv-sky);\n\n  /* hero stat figures */\n  --stat-on-light:   var(--htv-blue);\n  --stat-on-dark:    var(--htv-gold);\n\n  --focus-ring:      var(--htv-blue);\n}\n<\u002Fstyle>\n  <style>/* HTV Sales — Typography tokens\n   Typeface: Effra (geometric humanist sans) across everything.\n   Scale derived from the Proposal Builder deck (48pt cover head, 44pt section head,\n   28pt subhead, 18/14/12/11 supporting) plus oversized hero figures from One Pitch recaps. */\n\n:root {\n  --font-sans: \"Effra\", \"Segoe UI\", system-ui, -apple-system, \"Helvetica Neue\", Arial, sans-serif;\n  --font-display: var(--font-sans);\n\n  /* weights (mapped to the 5 Effra Std cuts) */\n  --fw-light:   300; /* @kind font */ /* Effra Std Light   */\n  --fw-regular: 400; /* @kind font */ /* Effra Std Regular */\n  --fw-medium:  500; /* @kind font */ /* Effra Std Medium  */\n  --fw-bold:    700; /* @kind font */ /* Effra Std Bold    */\n  --fw-heavy:   800; /* @kind font */ /* Effra Std Heavy   */\n\n  /* type scale (px) */\n  --text-mega:    96px; /* One Pitch hero figures, e.g. 2,388,700        */\n  --text-display: 64px; /* big sub-hero numbers                          */\n  --text-h1:      48px; /* cover headline                                */\n  --text-h2:      44px; /* section headline                              */\n  --text-h3:      28px; /* sub-headline                                  */\n  --text-h4:      22px; /* card / column title                           */\n  --text-lg:      18px;\n  --text-body:    16px;\n  --text-sm:      14px;\n  --text-xs:      12px;\n  --text-label:   11px; /* ALL-CAPS tracked eyebrow / kicker             */\n\n  /* line heights */\n  --lh-tight:   1.04; /* @kind font */\n  --lh- ht: 800; font-size: 40px; line-height: 1.06; letter-spacing: -0.02em; margin: 10px 0 0; color: var(--htv-navy);\">Cyclosporiasis cases across <span style=\"color: var(--htv-blue);\">Florida<\u002Fspan><\u002Fh1>\n      <p style=\"font-size: 16px; line-height: 1.5; color: var(--text-secondary); margin: 12px 0 0; max-width: 620px;\">A parasitic intestinal illness spread through contaminated food and water. Confirmed and probable cases reported to the state between May 1 and July 11, 2026, mapped by county of residence.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- Stat row -->\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px 24px; margin-top: 28px; padding: 20px 22px; background: var(--htv-gray); border-radius: 8px;\">\n      <div style=\"min-width: 0;\">\n        <div style=\"font-weight: 700; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--htv-blue); margin-bottom: 6px;\">Total cases statewide<\u002Fdiv>\n        <div style=\"font-weight: 800; font-size: clamp(34px, 9vw, 60px); line-height: 1; letter-spacing: -0.02em; color: var(--htv-blue); font-variant-numeric: tabular-nums;\">96<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"min-width: 0;\">\n        <div style=\"font-weight: 700; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--htv-blue); margin-bottom: 6px;\">Counties affected<\u002Fdiv>\n        <div style=\"font-weight: 800; font-size: clamp(34px, 9vw, 60px); line-height: 1; letter-spacing: -0.02em; color: var(--htv-blue); font-variant-numeric: tabular-nums;\">30<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"min-width: 0;\">\n        <div style=\"font-weight: 700; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--htv-blue); margin-bottom: 6px;\">Highest county · 17 cases<\u002Fdiv>\n        <div style=\"font-weight: 800; font-size: clamp(26px, 6.5vw, 44px); line-height: 1.02; letter-spacing: -0.02em; color: var(--htv-blue); word-break: break-word;\">Miami-Dade<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Map -->\n    <div style=\"margin-top: 32px;\">\n      <div style=\"font-weight: 700; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--htv-blue); margin-bottom: 4px;\">Cases by county<\u002Fdiv>\n      <div style=\"font-size: 13px; color: var(--text-muted); margin-bottom: 16px;\">Hover a county for detail · click to highlight it in the table<\u002Fdiv>\n\n      <div style=\"position: relative; width: 100%; min-height: 340px; text-align: center;\">\n        <div ref=\"{{ setMapRef }}\" style=\"width: 100%;\"><\u002Fdiv>\n        <sc-if value=\"{{ notReady }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 14px;\">{{ mapStatus }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- Legend -->\n      <div style=\"margin-top: 12px; padding-top: 14px; border-top: 1px solid var(--border-subtle);\">\n        <div style=\"font-weight: 700; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px;\">Cases<\u002Fdiv>\n        <div style=\"display: flex; flex-wrap: wrap; align-items: center; gap: 18px;\">\n        <div style=\"display: flex; align-items: center; gap: 7px;\"><span style=\"width: 16px; height: 16px; background: #E2E5EA; border: 1px solid #CBD1DA; border-radius: 2px;\"><\u002Fspan><span style=\"font-size: 13px; color: var(--text-secondary);\">None reported<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; align-items: center; gap: 7px;\"><span style=\"width: 16px; height: 16px; background: #C2D8F6; border-radius: 2px;\"><\u002Fspan><span style=\"font-size: 13px; color: var(--text-secondary);\">1<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; align-items: center; gap: 7px;\"><span style=\"width: 16px; height: 16px; background: #8FBCF0; border-radius: 2px;\"><\u002Fspan><span style=\"font-size: 13px; color: var(--text-secondary);\">2–3<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; align-items: center; gap: 7px;\"><span style=\"width: 16px; height: 16px; background: #3D7FDC; border-radius: 2px;\"><\u002Fspan><span style=\"font-size: 13px; color: var(--text-secondary);\">4–7<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; align-items: center; gap: 7px;\"><span style=\"width: 16px; height: 16px; background: #10307A; border-radius: 2px;\"><\u002Fspan><span style=\"font-size: 13px; color: var(--text-secondary);\">8+<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Table -->\n    <div style=\"margin-top: 32px;\">\n      <div style=\"display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 12px; flex-wrap: wrap;\">\n        <div>\n          <div style=\"font-weight: 700; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--htv-blue);\">County breakdown<\u002Fdiv>\n          <div style=\"font-size: 13px; color: var(--text-muted); margin-top: 2px;\">All 30 counties with reported cases<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; align-items: center; gap: 8px;\">\n          <span style=\"font-size: 12px; color: var(--text-muted); font-weight: 500;\">Sort<\u002Fspan>\n          <button class=\"gcn-sortbtn\" sc-camel-on-click=\"{{ sortByCases }}\" style=\"{{ casesBtnStyle }}\">Cases<\u002Fbutton>\n          <button class=\"gcn-sortbtn\" sc-camel-on-click=\"{{ sortByName }}\" style=\"{{ nameBtnStyle }}\">County A–Z<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border: 1px solid var(--border-subtle); border-radius: 8px; overflow: hidden;\">\n        <div style=\"display: grid; grid-template-columns: 40px 1fr 92px; gap: 0; background: var(--htv-navy); color: var(--htv-white); font-weight: 700; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; padding: 12px 18px;\">\n          <span><\u002Fspan>\n          <span>County<\u002Fspan>\n          <span style=\"text-align: right;\">Cases<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"max-height: {{ tableHeight }}; overflow-y: auto;\">\n          <sc-for list=\"{{ rows }}\" as=\"row\" hint-placeholder-count=\"8\">\n            <div class=\"gcn-row\" sc-camel-on-click=\"{{ row.onSelect }}\" style=\"{{ row.style }}\">\n              <span style=\"width: 15px; height: 15px; border-radius: 2px; background: {{ row.color }}; border: 1px solid rgba(0,16,45,0.12);\"><\u002Fspan>\n              <span style=\"font-size: 15px; font-weight: 500; color: var(--htv-navy);\">{{ row.county }}<\u002Fspan>\n              <span style=\"text-align: right; font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--htv-blue);\">{{ row.count }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Footer -->\n    <div style=\"margin-top: 28px; padding-top: 16px; border-top: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;\">\n      <div style=\"font-size: 12px; color: var(--text-muted); line-height: 1.5;\">Source: Florida Department of Health — Reportable &amp; Infectious Diseases Frequency Report. County map boundaries: U.S. Census Bureau.<\u002Fdiv>\n      <div style=\"font-weight: 800; font-size: 13px; letter-spacing: -0.01em; color: var(--htv-navy); white-space: nowrap;\">GULF COAST NEWS<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:940,&quot;height&quot;:1100},&quot;defaultSort&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Cases (high to low)&quot;,&quot;County (A–Z)&quot;],&quot;default&quot;:&quot;Cases (high to low)&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Behavior&quot;},&quot;tableHeight&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:320,&quot;min&quot;:180,&quot;max&quot;:640,&quot;step&quot;:20,&quot;unit&quot;:&quot;px&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Behavior&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    const initial = (props.defaultSort === 'County (A–Z)') ? 'name' : 'cases';\n    this.state = { selected: null, sort: initial, status: 'loading' };\n    this.data = [\n      { county: 'Alachua', count: 2 }, { county: 'Brevard', count: 1 },\n      { county: 'Broward', count: 7 }, { county: 'Collier', count: 2 },\n      { county: 'Columbia', count: 1 }, { county: 'Duval', count: 4 },\n      { county: 'Escambia', count: 1 }, { county: 'Flagler', count: 2 },\n      { county: 'Gadsden', count: 1 }, { county: 'Highlands', count: 2 },\n      { county: 'Hillsborough', count: 3 }, { county: 'Lake', count: 3 },\n      { county: 'Lee', count: 14 }, { county: 'Manatee', count: 1 },\n      { county: 'Martin', count: 1 }, { county: 'Miami-Dade', count: 17 },\n      { county: 'Monroe', count: 1 }, { county: 'Okaloosa', count: 2 },\n      { county: 'Orange', count: 3 }, { county: 'Osceola', count: 4 },\n      { county: 'Palm Beach', count: 2 }, { county: 'Pasco', count: 1 },\n      { county: 'Pinellas', count: 3 }, { county: 'Polk', count: 4 },\n      { county: 'Seminole', count: 5 }, { county: 'St. Johns', count: 3 },\n      { county: 'St. Lucie', count: 2 }, { county: 'Sumter', count: 2 },\n      { county: 'Volusia', count: 2 },\n    ];\n  }\n\n  norm(s) { return String(s).toLowerCase().replace(/[^a-z]/g, ''); }\n\n  getColor(n) {\n    if (!n) return '#E2E5EA';\n    if (n === 1) return '#C2D8F6';\n    if (n <= 3) return '#8FBCF0';\n    if (n <= 7) return '#3D7FDC';\n    return '#10307A';\n  }\n\n  loadScript(src) {\n    return new Promise((resolve, reject) => {\n      const s = document.createElement('script');\n      s.src = src; s.onload = resolve; s.onerror = reject;\n      document.head.appendChild(s);\n    });\n  }\n\n  async componentDidMount() {\n    try {\n      if (!window.d3) await this.loadScript('https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js');\n      if (!window.topojson) await this.loadScript('https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js');\n      const topoUrl = (window.__resources && window.__resources.countyTopo) || 'https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json';\n      this.topo = await fetch(topoUrl).then(r => r.json());\n      this.renderMap();\n      this.setState({ status: 'ready' });\n    } catch (e) {\n      this.setState({ status: 'error' });\n    }\n  }\n\n  renderMap() {\n    const topo = this.topo;\n    const d3 = window.d3, topojson = window.topojson;\n    const el = this.mapRef;\n    if (!el || !topo || !d3 || !topojson) return;\n    el.innerHTML = '';\n    const counties = topojson.feature(topo, topo.objects.counties);\n    const fl = { type: 'FeatureCollection', features: counties.features.filter(f => String(f.id).slice(0, 2) === '12') };\n    const states = topojson.feature(topo, topo.objects.states);\n    const flState = states.features.find(f => String(f.id) === '12');\n\n    const lookup = {};\n    this.data.forEach(d => { lookup[this.norm(d.county)] = d.count; });\n\n    const w = 680, h = 500;\n    const proj = d3.geoMercator().fitExtent([[8, 8], [w - 8, h - 8]], fl);\n    const path = d3.geoPath(proj);\n\n    const svg = d3.select(el).append('svg')\n      .attr('viewBox', `0 0 ${w} ${h}`)\n      .attr('width', '100%')\n      .style('max-width', '680px')\n      .style('height', 'auto')\n      .style('display', 'block')\n      .style('margin', '0 auto')\n      .style('overflow', 'visible');\n\n    const tip = d3.select(el).append('div')\n      .style('position', 'absolute')\n      .style('pointer-events', 'none')\n      .style('opacity', 0)\n      .style('background', '#00102D')\n      .style('color', '#fff')\n      .style('padding', '7px 11px')\n      .style('border-radius', '6px')\n      .style('font-size', '13px')\n      .style('font-family', 'var(--font-sans)')\n      .style('line-height', '1.3')\n      .style('white-space', 'nowrap')\n      .style('box-shadow', '0 6px 20px rgba(0,16,45,0.28)')\n      .style('z-index', '10');\n\n    const self = this;\n    this.counties = svg.append('g').selectAll('path').data(fl.features).join('path')\n      .attr('d', path)\n      .attr('fill', d => this.getColor(lookup[this.norm(d.properties.name)] || 0))\n      .attr('stroke', '#fff')\n      .attr('stroke-width', 0.6)\n      .style('cursor', 'pointer')\n      .style('transition', 'fill 120ms')\n      .on('mouseenter', function (e, d) {\n        const n = lookup[self.norm(d.properties.name)] || 0;\n        tip.style('opacity', 1).html(`<strong>${d.properties.name}<\u002Fstrong><br>${n} case${n === 1 ? '' : 's'}`);\n        d3.select(this).attr('stroke', '#00102D').attr('stroke-width', 1.4).raise();\n      })\n      .on('mousemove', function (e) {\n        const r = el.getBoundingClientRect();\n        tip.style('left', (e.clientX - r.left + 14) + 'px').style('top', (e.clientY - r.top - 10) + 'px');\n      })\n      .on('mouseleave', function (e, d) {\n        tip.style('opacity', 0);\n        self.applySelection();\n      })\n      .on('click', (e, d) => this.select(d.properties.name));\n\n    svg.append('path').datum(flState).attr('d', path)\n      .attr('fill', 'none').attr('stroke', '#00102D').attr('stroke-width', 1.3).style('pointer-events', 'none');\n\n    this.applySelection();\n  }\n\n  applySelection() {\n    if (!this.counties) return;\n    const sel = this.state.selected;\n    const self = this;\n    this.counties\n      .attr('stroke', d => (sel && self.norm(d.properties.name) === self.norm(sel)) ? '#F1D273' : '#fff')\n      .attr('stroke-width', d => (sel && self.norm(d.properties.name) === self.norm(sel)) ? 3 : 0.6);\n    this.counties.filter(d => sel && self.norm(d.properties.name) === self.norm(sel)).raise();\n  }\n\n  componentDidUpdate(prevProps, prevState) {\n    if (prevState.selected !== this.state.selected) this.applySelection();\n  }\n\n  select(name) {\n    this.setState(s => ({ selected: s.selected && this.norm(s.selected) === this.norm(name) ? null : name }));\n  }\n\n  renderVals() {\n    const sort = this.state.sort;\n    const selected = this.state.selected;\n    const rows = this.data.slice().sort((a, b) =>\n      sort === 'name' ? a.county.localeCompare(b.county) : (b.count - a.count || a.county.localeCompare(b.county))\n    ).map(d => {\n      const isSel = selected && this.norm(selected) === this.norm(d.county);\n      return {\n        county: d.county,\n        count: d.count,\n        color: this.getColor(d.count),\n        onSelect: () => this.select(d.county),\n        style: `display: grid; grid-template-columns: 40px 1fr 92px; align-items: center; padding: 11px 18px; border-top: 1px solid var(--border-subtle); cursor: pointer; transition: background 120ms; background: ${isSel ? 'var(--htv-blue-100)' : '#fff'}; box-shadow: ${isSel ? 'inset 3px 0 0 var(--htv-gold)' : 'none'};`,\n      };\n    });\n\n    const btnBase = 'font-family: var(--font-sans); font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 120ms;';\n    const active = btnBase + 'background: var(--htv-blue); color: #fff; border: 1px solid var(--htv-blue);';\n    const idle = btnBase + 'background: #fff; color: var(--htv-navy); border: 1px solid var(--border-default);';\n\n    const status = this.state.status;\n    return {\n      rows,\n      notReady: status !== 'ready',\n      mapStatus: status === 'error' ? 'Map could not be loaded.' : 'Loading map…',\n      sortByCases: () => this.setState({ sort: 'cases' }),\n      sortByName: () => this.setState({ sort: 'name' }),\n      casesBtnStyle: sort === 'cases' ? active : idle,\n      nameBtnStyle: sort === 'name' ? active : idle,\n      tableHeight: (this.props.tableHeight || 320) + 'px',\n      setMapRef: (el) => { if (el && el !== this.mapRef) { this.mapRef = el; this.renderMap(); } },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
